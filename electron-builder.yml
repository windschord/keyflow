appId: com.windschord.keyflow
productName: keyflow
copyright: Copyright © 2026

directories:
  output: dist-electron
  buildResources: build

# electron-builderによる自動npmRebuildを無効化する。
# ネイティブアドオンは使用していない（MIDIはRendererのWeb MIDI APIで処理）。
# opensheetmusicdisplayの依存関係であるheadless-gl（gl）は
# Electronレンダラーではブラウザ標準のCanvas/WebGLを使用するため
# 実行時に不要だが、node-gypでのネイティブビルドがElectron 42の
# V8 APIと非互換でリビルドに失敗するため、自動リビルド対象から外す。
npmRebuild: false

win:
  # US-018: x64/arm64の2アーキテクチャへ対応し、NSISインストーラーに加えて
  # インストール不要のportable版（単一実行ファイル）も提供する。
  target:
    - target: nsis
      arch: [x64, arm64]
    - target: portable
      arch: [x64, arm64]
  icon: build/icon.ico
  requestedExecutionLevel: asInvoker

# macOSターゲット（TASK-035）
# 署名（codesign）・公証（Notarization）はスコープ外。未署名ビルドのため、
# 初回起動時にmacOS Gatekeeperの警告が表示されるが既知の制約として許容する。
mac:
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  icon: build/icon.icns
  category: public.app-category.music
  identity: null
  hardenedRuntime: false
  gatekeeperAssess: false

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  multiLanguageInstaller: true
  installerLanguages: [ja_JP, en_US]
  # US-018: 配布形態（Setup）とアーキテクチャを識別できる命名にする。
  # 複数archを別々のインストーラーとして出力する（ユニバーサル1本化を避ける）。
  # buildUniversalInstaller: false でx64/arm64を1本に束ねた統合版の生成を抑止し、
  # arch別インストーラーのみを出力する（既定はtrueで統合版も追加生成される）。
  buildUniversalInstaller: false
  artifactName: ${productName}-Setup-${version}-${arch}.${ext}

# US-018: インストール不要のportable版（単一実行ファイル）。
# 実行時に一時フォルダへ展開して起動し、レジストリ変更・管理者権限を要さない。
# portable側もbuildUniversalInstaller: falseで統合版を抑止し、arch別の単一実行ファイルのみ出力する。
portable:
  buildUniversalInstaller: false
  artifactName: ${productName}-Portable-${version}-${arch}.${ext}

files:
  - out/**/*
  - '!node_modules/**/{CHANGELOG.md,README.md,readme.md}'
  - '!node_modules/**/*.{ts,map}'

publish: null
